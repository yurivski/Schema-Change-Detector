<!-- Template para a seção de Safe Changes do relatório de mudanças de esquema. -->

<div class="section">
    <h3 class="section-title safe">Safe Changes ({{count}})</h3>
    <table class="changes-table">
        <thead>
            <tr>
                <th>Coluna</th>
                <th>Tipo de Mudança</th>
                <th>Detalhes</th>
            </tr>
        </thead>
        <tbody>
            {{linhas}}
        </tbody>
    </table>
</div>
